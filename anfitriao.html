<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Duas Verdades e Uma Mentira - Anfitrião</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px 25px;
            margin-bottom: 20px;
            display: flex;
 justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .avatar {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
        }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn {
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border: none;
            transition: all 0.3s;
        }
        .btn-primary { background: #f59e0b; color: white; }
        .btn-primary:hover { background: #d97706; transform: translateY(-2px); }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; transform: translateY(-2px); }
        .btn-success { background: #10b981; color: white; }
        .btn-success:hover { background: #059669; transform: translateY(-2px); }
        .btn-warning { background: #8b5cf6; color: white; }
        .btn-warning:hover { background: #7c3aed; transform: translateY(-2px); }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e5e7eb;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-waiting { background: #fef3c7; color: #d97706; }
        .status-writing { background: #dbeafe; color: #2563eb; }
        .status-voting { background: #e0f2fe; color: #0284c7; }
        .status-finished { background: #d1fae5; color: #065f46; }
        
        .jogadores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .jogador-card {
            background: #f3f4f6;
            border-radius: 16px;
            padding: 15px;
            position: relative;
        }
        .jogador-card.pronto {
            background: #d1fae5;
            border: 2px solid #10b981;
        }
        .jogador-card .nome {
            font-weight: bold;
            font-size: 16px;
        }
        .jogador-card .status {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }
        .check-icon {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #10b981;
            font-size: 20px;
        }
        
        .frases-preview {
            background: #fef3c7;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
        }
        .frase-item {
            padding: 12px;
            background: white;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        
        .ranking-list {
            max-height: 400px;
            overflow-y: auto;
        }
        .ranking-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        .ranking-pos {
            width: 40px;
            height: 40px;
            background: #f3f4f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .ranking-pos.top1 { background: linear-gradient(135deg, #f59e0b, #fbbf24); color: white; }
        .ranking-pos.top2 { background: linear-gradient(135deg, #94a3b8, #cbd5e1); color: white; }
        .ranking-pos.top3 { background: linear-gradient(135deg, #b45309, #d97706); color: white; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            z-index: 1000;
            animation: fadeOut 3s ease;
        }
        .toast.error { background: #ef4444; }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .timer-display {
            font-size: 48px;
            font-weight: bold;
            text-align: center;
            font-family: monospace;
            background: #1f2937;
            color: #f59e0b;
            padding: 15px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="user-info">
                <div class="avatar"><i class="fas fa-crown"></i></div>
                <div>
                    <h2 id="hostNome">Anfitrião</h2>
                    <p id="hostEmail">---</p>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn btn-warning" onclick="mostrarRanking()">
                    <i class="fas fa-trophy"></i> Ranking
                </button>
                <button class="btn btn-danger" onclick="confirmarReset()">
                    <i class="fas fa-trash"></i> Resetar Jogo
                </button>
                <button class="btn" onclick="confirmarLogout()" style="background:#f3f4f6;">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-users"></i> Jogadores na Sala</h2>
                <span id="statusBadge" class="status-badge status-waiting">
                    <i class="fas fa-hourglass-half"></i> Aguardando Frases
                </span>
            </div>
            <div id="jogadoresList" class="jogadores-grid">
                <div style="text-align:center; padding:20px;">Carregando jogadores...</div>
            </div>
        </div>

        <div class="card" id="frasesCard" style="display:none;">
            <div class="card-header">
                <h2><i class="fas fa-pen-fancy"></i> Frases Enviadas</h2>
                <button class="btn btn-success" id="btnIniciarRodada" onclick="iniciarProximaRodada()" disabled>
                    <i class="fas fa-play"></i> Iniciar Próxima Rodada
                </button>
            </div>
            <div id="frasesPreview"></div>
        </div>

        <div class="card" id="rodadaCard" style="display:none;">
            <div class="card-header">
                <h2><i class="fas fa-gamepad"></i> Rodada Atual</h2>
                <div class="timer-input" style="display: flex; gap: 10px; align-items: center;">
                    <span>Tempo: </span>
                    <input type="number" id="tempoRodada" value="30" min="15" max="120" style="width:70px; padding:5px; border-radius:8px; border:1px solid #ddd;">
                    <span>seg</span>
                </div>
            </div>
            <div id="rodadaContent">
                <div style="text-align:center; padding:30px;">
                    <i class="fas fa-hourglass-half" style="font-size:50px;"></i>
                    <p>Aguardando início da rodada...</p>
                </div>
            </div>
        </div>

        <div class="card" id="resultadoCard" style="display:none;">
            <div class="card-header">
                <h2><i class="fas fa-chart-bar"></i> Resultado da Rodada</h2>
            </div>
            <div id="resultadoContent"></div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2><i class="fas fa-trophy"></i> Ranking Atual</h2>
                <button class="btn btn-primary" onclick="exibirRankingCompleto()">
                    <i class="fas fa-chart-line"></i> Ver Detalhes
                </button>
            </div>
            <div id="rankingResumido" class="ranking-list">
                <div style="text-align:center; padding:20px;">Aguardando pontuações...</div>
            </div>
        </div>
    </div>

    <script>
        let todosJogadores = {};
        let frasesEnviadas = {};
        let rodadaAtiva = false;
        let jogadorAtual = null;
        let timerInterval = null;
        let votosRodada = {};

        function showToast(msg, type = "success") {
            const toast = document.createElement('div');
            toast.className = `toast ${type === "error" ? "error" : ""}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showLoading() {
            const overlay = document.createElement('div');
            overlay.id = 'loadingOverlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = '<div class="spinner"></div>';
            document.body.appendChild(overlay);
        }

        function hideLoading() {
            const overlay = document.getElementById('loadingOverlay');
            if (overlay) overlay.remove();
        }

        async function carregarJogadores() {
            window.db.ref('jogadores').on('value', (snapshot) => {
                todosJogadores = snapshot.val() || {};
                const online = Object.entries(todosJogadores).filter(([_, j]) => j.online === true);
                const container = document.getElementById('jogadoresList');
                
                if (online.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:20px;">Nenhum jogador online</div>';
                    return;
                }
                
                container.innerHTML = online.map(([id, j]) => `
                    <div class="jogador-card ${j.pronto ? 'pronto' : ''}">
                        <div class="nome"><i class="fas fa-user"></i> ${j.nome}</div>
                        <div class="status">
                            ${j.frases ? 
                                '<i class="fas fa-check-circle" style="color:#10b981;"></i> Frases enviadas' : 
                                '<i class="fas fa-hourglass-half"></i> Aguardando frases'}
                        </div>
                        ${j.pronto ? '<div class="check-icon"><i class="fas fa-check-circle"></i></div>' : ''}
                    </div>
                `).join('');
                
                const todosProntos = online.length > 0 && online.every(([_, j]) => j.pronto === true);
                const btnIniciar = document.getElementById('btnIniciarRodada');
                if (btnIniciar) {
                    btnIniciar.disabled = !todosProntos;
                }
                
                if (todosProntos && online.length > 0 && !rodadaAtiva) {
                    document.getElementById('frasesCard').style.display = 'block';
                    carregarFrases();
                } else if (!todosProntos) {
                    document.getElementById('frasesCard').style.display = 'none';
                }
                
                atualizarRankingResumido();
            });
        }

        async function carregarFrases() {
            const frasesRef = window.db.ref('frases');
            const snapshot = await frasesRef.once('value');
            frasesEnviadas = snapshot.val() || {};
            
            const container = document.getElementById('frasesPreview');
            const jogadoresComFrases = Object.entries(todosJogadores)
                .filter(([id, j]) => j.online && frasesEnviadas[id]);
            
            if (jogadoresComFrases.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Nenhuma frase enviada ainda...</div>';
                return;
            }
            
            container.innerHTML = `
                <h3>📝 Frases dos Jogadores</h3>
                ${jogadoresComFrases.map(([id, j]) => {
                    const frases = frasesEnviadas[id];
                    return `
                        <div class="frase-item">
                            <strong><i class="fas fa-user"></i> ${j.nome}</strong>
                            <div style="margin-top:8px; padding-left:15px;">
                                <div>1️⃣ ${frases.frase1}</div>
                                <div>2️⃣ ${frases.frase2}</div>
                                <div>3️⃣ ${frases.frase3}</div>
                            </div>
                        </div>
                    `;
                }).join('')}
                <div style="margin-top:15px; padding:12px; background:#d1fae5; border-radius:12px;">
                    <i class="fas fa-check-circle"></i> Todos os jogadores já enviaram suas frases!
                    Clique em "Iniciar Próxima Rodada" para começar.
                </div>
            `;
        }

        async function iniciarProximaRodada() {
            if (rodadaAtiva) {
                showToast("Já existe uma rodada em andamento!", "error");
                return;
            }
            
            const jogadoresOnline = Object.entries(todosJogadores).filter(([_, j]) => j.online === true);
            if (jogadoresOnline.length === 0) {
                showToast("Não há jogadores online!", "error");
                return;
            }
            
            const jogadoresComFrases = jogadoresOnline.filter(([id, _]) => frasesEnviadas[id]);
            if (jogadoresComFrases.length === 0) {
                showToast("Nenhum jogador enviou frases ainda!", "error");
                return;
            }
            
            // Sorteia um jogador aleatório
            const randomIndex = Math.floor(Math.random() * jogadoresComFrases.length);
            const [jogadorId, jogadorData] = jogadoresComFrases[randomIndex];
            jogadorAtual = { id: jogadorId, ...jogadorData, frases: frasesEnviadas[jogadorId] };
            
            rodadaAtiva = true;
            
            // Salvar rodada no Firebase
            const rodadaId = `rodada_${Date.now()}`;
            await window.db.ref(`rodadaAtiva`).set({
                id: rodadaId,
                jogadorId: jogadorId,
                jogadorNome: jogadorData.nome,
                frase1: jogadorAtual.frases.frase1,
                frase2: jogadorAtual.frases.frase2,
                frase3: jogadorAtual.frases.frase3,
                mentiraIndex: jogadorAtual.frases.mentiraIndex,
                ativa: true,
                inicioEm: Date.now(),
                tempoLimite: parseInt(document.getElementById('tempoRodada').value),
                votos: { A: 0, B: 0, C: 0 }
            });
            
            await window.db.ref('votosRodada').set({});
            votosRodada = {};
            
            atualizarInterfaceRodada();
            iniciarTimer();
            showToast(`🎲 Rodada iniciada! Vez de ${jogadorData.nome}`);
        }
        
        function iniciarTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            const tempo = parseInt(document.getElementById('tempoRodada').value);
            let tempoRestante = tempo;
            const timerElement = document.getElementById('timerRodada');
            
            timerInterval = setInterval(async () => {
                tempoRestante--;
                if (timerElement) timerElement.textContent = `${tempoRestante}s`;
                
                if (tempoRestante <= 0) {
                    clearInterval(timerInterval);
                    await finalizarRodada();
                }
            }, 1000);
        }
        
        async function finalizarRodada() {
            if (!rodadaAtiva) return;
            
            clearInterval(timerInterval);
            rodadaAtiva = false;
            
            // Buscar votos
            const votosSnap = await window.db.ref('votosRodada').once('value');
            const votos = votosSnap.val() || {};
            const totalVotos = Object.keys(votos).length;
            
            // Contar votos por alternativa
            const contagem = { A: 0, B: 0, C: 0 };
            Object.values(votos).forEach(v => {
                if (contagem[v] !== undefined) contagem[v]++;
            });
            
            const mentiraIndex = jogadorAtual.frases.mentiraIndex;
            const letraMentira = mentiraIndex === 1 ? 'A' : (mentiraIndex === 2 ? 'B' : 'C');
            const votosMentira = contagem[letraMentira];
            const acertaram = votosMentira > (totalVotos / 2);
            
            // Atualizar pontuações
            const pontuacoesRef = window.db.ref('pontuacoes');
            const pontuacoesSnap = await pontuacoesRef.once('value');
            let pontuacoes = pontuacoesSnap.val() || {};
            
            if (acertaram) {
                // Jogador atual perde ponto (foi descoberto)
                pontuacoes[jogadorAtual.id] = (pontuacoes[jogadorAtual.id] || 0);
                // Quem acertou ganha ponto
                for (const [votanteId, voto] of Object.entries(votos)) {
                    if (voto === letraMentira) {
                        pontuacoes[votanteId] = (pontuacoes[votanteId] || 0) + 1;
                    }
                }
                await pontuacoesRef.set(pontuacoes);
                
                document.getElementById('resultadoContent').innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <i class="fas fa-check-circle" style="font-size:60px; color:#10b981;"></i>
                        <h2 style="color:#10b981;">ACERTARAM!</h2>
                        <p>A maioria votou na mentira correta!</p>
                        <div style="background:#fef3c7; border-radius:16px; padding:20px; margin-top:20px;">
                            <h3>🎭 ${jogadorAtual.nome}</h3>
                            <p><strong>Mentira era:</strong> ${jogadorAtual.frases[`frase${mentiraIndex}`]}</p>
                            <p><strong>História real:</strong></p>
                            <p style="margin-top:10px;">${jogadorAtual.frases.historiaReal || "O jogador vai contar a história real agora!"}</p>
                        </div>
                    </div>
                `;
            } else {
                // Jogador atual ganha ponto extra
                pontuacoes[jogadorAtual.id] = (pontuacoes[jogadorAtual.id] || 0) + 3;
                await pontuacoesRef.set(pontuacoes);
                
                document.getElementById('resultadoContent').innerHTML = `
                    <div style="text-align:center; padding:20px;">
                        <i class="fas fa-times-circle" style="font-size:60px; color:#ef4444;"></i>
                        <h2 style="color:#ef4444;">ERRARAM!</h2>
                        <p>A maioria não descobriu a mentira!</p>
                        <div style="background:#d1fae5; border-radius:16px; padding:20px; margin-top:20px;">
                            <h3>🎉 ${jogadorAtual.nome} GANHOU 3 PONTOS!</h3>
                            <p><strong>A mentira era:</strong> ${jogadorAtual.frases[`frase${mentiraIndex}`]}</p>
                        </div>
                    </div>
                `;
            }
            
            document.getElementById('resultadoCard').style.display = 'block';
            document.getElementById('rodadaCard').style.display = 'none';
            
            // Remover jogador da lista de pendentes
            await window.db.ref(`frases/${jogadorAtual.id}`).remove();
            
            // Verificar se ainda há jogadores com frases
            const frasesRestantes = await window.db.ref('frases').once('value');
            const temJogadores = Object.keys(frasesRestantes.val() || {}).length > 0;
            
            if (!temJogadores) {
                // Resetar prontos para nova rodada
                const jogadores = await window.db.ref('jogadores').once('value');
                for (const [id, j] of Object.entries(jogadores.val() || {})) {
                    if (j.online) {
                        await window.db.ref(`jogadores/${id}/pronto`).set(false);
                        await window.db.ref(`jogadores/${id}/frases`).set(null);
                    }
                }
                await window.db.ref('rodadaAtiva').set(null);
                showToast("🏆 Rodada finalizada! Todos já jogaram. Inicie uma nova rodada quando todos enviarem novas frases.");
                document.getElementById('frasesCard').style.display = 'none';
            }
            
            atualizarRankingResumido();
        }
        
        function atualizarInterfaceRodada() {
            document.getElementById('rodadaCard').style.display = 'block';
            document.getElementById('resultadoCard').style.display = 'none';
            
            const frases = [
                jogadorAtual.frases.frase1,
                jogadorAtual.frases.frase2,
                jogadorAtual.frases.frase3
            ];
            
            document.getElementById('rodadaContent').innerHTML = `
                <div style="text-align:center;">
                    <div class="timer-display" id="timerRodada">${document.getElementById('tempoRodada').value}s</div>
                    <h3 style="margin:20px 0;">🎭 Quem está na rodada?</h3>
                    <div style="background:linear-gradient(135deg, #f59e0b, #ef4444); color:white; padding:20px; border-radius:20px; margin:15px 0;">
                        <i class="fas fa-user-circle" style="font-size:50px;"></i>
                        <h2>${jogadorAtual.nome}</h2>
                        <p>Este jogador enviou 3 frases. Uma delas é MENTIRA!</p>
                    </div>
                    <h3>📝 Frases:</h3>
                    <div style="display:grid; gap:15px; margin:20px 0;">
                        <div style="background:#f3f4f6; padding:15px; border-radius:16px;">
                            <strong>A)</strong> ${frases[0]}
                        </div>
                        <div style="background:#f3f4f6; padding:15px; border-radius:16px;">
                            <strong>B)</strong> ${frases[1]}
                        </div>
                        <div style="background:#f3f4f6; padding:15px; border-radius:16px;">
                            <strong>C)</strong> ${frases[2]}
                        </div>
                    </div>
                    <p><i class="fas fa-clock"></i> Os jogadores têm tempo para votar qual é a mentira!</p>
                </div>
            `;
        }
        
        function listenToRodada() {
            window.db.ref('rodadaAtiva').on('value', (snapshot) => {
                const rodada = snapshot.val();
                if (!rodada || !rodada.ativa) {
                    if (rodadaAtiva) {
                        clearInterval(timerInterval);
                        rodadaAtiva = false;
                        document.getElementById('rodadaCard').style.display = 'none';
                    }
                } else {
                    if (!rodadaAtiva && rodada.ativa) {
                        jogadorAtual = {
                            id: rodada.jogadorId,
                            nome: rodada.jogadorNome,
                            frases: {
                                frase1: rodada.frase1,
                                frase2: rodada.frase2,
                                frase3: rodada.frase3,
                                mentiraIndex: rodada.mentiraIndex
                            }
                        };
                        rodadaAtiva = true;
                        atualizarInterfaceRodada();
                        iniciarTimer();
                    }
                }
            });
        }
        
        async function atualizarRankingResumido() {
            const pontuacoesSnap = await window.db.ref('pontuacoes').once('value');
            const pontuacoes = pontuacoesSnap.val() || {};
            const jogadoresSnap = await window.db.ref('jogadores').once('value');
            const jogadores = jogadoresSnap.val() || {};
            
            const ranking = Object.entries(pontuacoes)
                .map(([id, pontos]) => ({
                    id,
                    nome: jogadores[id]?.nome || id,
                    pontos
                }))
                .sort((a, b) => b.pontos - a.pontos)
                .slice(0, 5);
            
            const container = document.getElementById('rankingResumido');
            if (ranking.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px;">Nenhuma pontuação ainda</div>';
                return;
            }
            
            container.innerHTML = ranking.map((r, idx) => `
                <div class="ranking-item">
                    <div class="ranking-pos ${idx === 0 ? 'top1' : idx === 1 ? 'top2' : idx === 2 ? 'top3' : ''}">
                        ${idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : idx+1}
                    </div>
                    <div style="flex:1;"><strong>${r.nome}</strong></div>
                    <div><strong>${r.pontos}</strong> pts</div>
                </div>
            `).join('');
        }
        
        async function mostrarRanking() {
            const pontuacoesSnap = await window.db.ref('pontuacoes').once('value');
            const pontuacoes = pontuacoesSnap.val() || {};
            const jogadoresSnap = await window.db.ref('jogadores').once('value');
            const jogadores = jogadoresSnap.val() || {};
            
            const ranking = Object.entries(pontuacoes)
                .map(([id, pontos]) => ({ nome: jogadores[id]?.nome || id, pontos }))
                .sort((a, b) => b.pontos - a.pontos);
            
            let msg = "🏆 RANKING FINAL:\n\n";
            ranking.forEach((r, i) => {
                msg += `${i+1}º - ${r.nome}: ${r.pontos} pontos\n`;
            });
            alert(msg);
        }
        
        function exibirRankingCompleto() {
            mostrarRanking();
        }
        
        async function confirmarReset() {
            if (confirm("⚠️ ATENÇÃO! Isso vai resetar TODAS as pontuações e frases. Deseja continuar?")) {
                showLoading();
                await window.db.ref('pontuacoes').remove();
                await window.db.ref('frases').remove();
                await window.db.ref('rodadaAtiva').set(null);
                await window.db.ref('votosRodada').remove();
                
                const jogadores = await window.db.ref('jogadores').once('value');
                for (const [id, j] of Object.entries(jogadores.val() || {})) {
                    if (j.online) {
                        await window.db.ref(`jogadores/${id}/pronto`).set(false);
                        await window.db.ref(`jogadores/${id}/frases`).set(null);
                    }
                }
                hideLoading();
                showToast("✅ Jogo resetado com sucesso!");
                atualizarRankingResumido();
            }
        }
        
        async function confirmarLogout() {
            if (confirm("Deseja sair?")) {
                await window.auth.signOut();
                sessionStorage.clear();
                window.location.href = "index.html";
            }
        }
        
        function loadHostData() {
            const email = sessionStorage.getItem('hostEmail');
            document.getElementById('hostEmail').textContent = email || '---';
            document.getElementById('hostNome').innerHTML = `<i class="fas fa-user"></i> ${email?.split('@')[0] || 'Anfitrião'}`;
        }
        
        window.iniciarProximaRodada = iniciarProximaRodada;
        window.mostrarRanking = mostrarRanking;
        window.exibirRankingCompleto = exibirRankingCompleto;
        window.confirmarReset = confirmarReset;
        window.confirmarLogout = confirmarLogout;
        
        window.auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = "index.html";
                return;
            }
            loadHostData();
            await window.db.ref('sessao').set({ ativa: true, tipo: "2verdades1mentira" });
            carregarJogadores();
            listenToRodada();
        });
    </script>
</body>
</html>
