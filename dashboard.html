<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>2V1M - Projeção</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .rodada-display { text-align: center; }
        .jogador-destaque {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            color: white;
            padding: 30px;
            border-radius: 30px;
            margin: 20px 0;
        }
        .frase-card {
            background: #f3f4f6;
            border-radius: 20px;
            padding: 20px;
            margin: 15px 0;
            font-size: 18px;
        }
        .votos-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .voto-card {
            text-align: center;
            padding: 20px;
            background: #f3f4f6;
            border-radius: 20px;
            min-width: 120px;
        }
        .voto-numero {
            font-size: 48px;
            font-weight: bold;
            color: #f59e0b;
        }
        .ranking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .ranking-card {
            background: linear-gradient(135deg, #fef3c7, #fde68a);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
        }
        .posicao { font-size: 24px; font-weight: bold; }
        .modo-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .modo-normal { background: #dbeafe; color: #2563eb; }
        .modo-dificil { background: #fef3c7; color: #d97706; }
        
        .resultado-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            animation: fadeInModal 0.5s ease;
        }
        @keyframes fadeInModal {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .resultado-modal {
            background: white;
            max-width: 600px;
            width: 90%;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
        }
        .resultado-acerto {
            background: #d1fae5;
            color: #065f46;
            padding: 20px;
            border-radius: 20px;
        }
        .resultado-erro {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 20px;
        }
        .btn-fechar {
            margin-top: 20px;
            padding: 10px 30px;
            background: #f59e0b;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
        }
        .confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-theater-masks"></i> Duas Verdades e Uma Mentira</h1>
            <p>Tela de Projeção - Acompanhe o jogo em tempo real!</p>
        </div>

        <div class="card" id="rodadaCard">
            <div id="rodadaContent" style="text-align:center;">
                <i class="fas fa-hourglass-half" style="font-size:60px; color:#f59e0b;"></i>
                <h2 style="margin-top:15px;">Aguardando Rodada</h2>
                <p>O anfitrião vai iniciar o jogo em breve...</p>
            </div>
        </div>

        <div class="card" id="rankingCard">
            <h2><i class="fas fa-trophy"></i> Ranking</h2>
            <div id="rankingContent" class="ranking-grid">
                <div style="text-align:center;">Carregando...</div>
            </div>
        </div>
    </div>

    <div id="resultadoModal" style="display:none;"></div>

    <script>
        let resultadoExibido = false;
        
        function criarConfetti() {
            const confettiDiv = document.createElement('div');
            confettiDiv.className = 'confetti';
            confettiDiv.innerHTML = '🎉 🎊 ✨ 🎉 🎊 ✨';
            confettiDiv.style.fontSize = '30px';
            confettiDiv.style.textAlign = 'center';
            confettiDiv.style.paddingTop = '20px';
            document.body.appendChild(confettiDiv);
            setTimeout(() => confettiDiv.remove(), 3000);
        }
        
        function listenToResultado() {
            window.db.ref('resultadoRodada').on('value', (snapshot) => {
                const resultado = snapshot.val();
                
                if (resultado && resultado.finalizada && !resultadoExibido) {
                    resultadoExibido = true;
                    const jogador = resultado.jogadorAtual;
                    const modo = resultado.modo;
                    
                    let html = `
                        <div class="resultado-modal">
                            <h2><i class="fas fa-chart-line"></i> RESULTADO DA RODADA</h2>
                    `;
                    
                    // Determinar resultado baseado nos votos da maioria (já calculado no anfitrião)
                    // Vamos buscar os votos para mostrar estatísticas
                    
                    if (modo === "normal") {
                        // No modo normal, precisamos saber se acertaram a mentira
                        // Isso será determinado pelo anfitrião e salvo no resultado
                        html += `
                            <div style="margin:20px 0;">
                                <h3>🎭 Jogador da vez: ${jogador.nome}</h3>
                                <div style="background:#f3f4f6; padding:20px; border-radius:16px; margin:15px 0;">
                                    <p><strong>📝 A mentira era a opção ${jogador.mentiraOpcao}:</strong></p>
                                    <p>"${jogador.mentiraTexto}"</p>
                                    <p style="margin-top:10px;"><strong>📖 História real:</strong> ${jogador.historiaReal}</p>
                                </div>
                            </div>
                        `;
                    } else {
                        html += `
                            <div style="margin:20px 0;">
                                <h3>🎭 ${jogador.foiRevelado ? 'JOGADOR REVELADO!' : 'JOGADOR PERMANECEU ANÔNIMO'}</h3>
                                ${jogador.foiRevelado ? `
                                    <div class="resultado-erro" style="margin:15px 0;">
                                        <i class="fas fa-skull" style="font-size:50px;"></i>
                                        <h2>${jogador.nome} FOI DESMASCARADO!</h2>
                                        <p>O grupo descobriu a mentira e quem enviou as frases!</p>
                                    </div>
                                ` : `
                                    <div class="resultado-acerto" style="margin:15px 0;">
                                        <i class="fas fa-trophy" style="font-size:50px;"></i>
                                        <h2>${jogador.nome} NÃO FOI DESCOBERTO!</h2>
                                        <p>O autor permanece no anonimato!</p>
                                    </div>
                                `}
                                <div style="background:#f3f4f6; padding:20px; border-radius:16px; margin:15px 0;">
                                    <p><strong>📝 A mentira era a opção ${jogador.mentiraOpcao}:</strong></p>
                                    <p>"${jogador.mentiraTexto}"</p>
                                    <p style="margin-top:10px;"><strong>📖 História real:</strong> ${jogador.historiaReal}</p>
                                </div>
                            </div>
                        `;
                    }
                    
                    html += `
                            <button class="btn-fechar" onclick="fecharResultado()">
                                <i class="fas fa-check"></i> Continuar
                            </button>
                        </div>
                    `;
                    
                    const modalDiv = document.getElementById('resultadoModal');
                    modalDiv.innerHTML = html;
                    modalDiv.style.display = 'flex';
                    modalDiv.className = 'resultado-overlay';
                    
                    criarConfetti();
                    
                    // Fechar automaticamente após 10 segundos
                    setTimeout(() => {
                        fecharResultado();
                    }, 10000);
                }
            });
        }
        
        function fecharResultado() {
            const modalDiv = document.getElementById('resultadoModal');
            modalDiv.style.display = 'none';
            resultadoExibido = false;
        }
        
        function listenToRodada() {
            window.db.ref('rodadaAtiva').on('value', (snapshot) => {
                const rodada = snapshot.val();
                const container = document.getElementById('rodadaContent');
                const modo = rodada?.modo || "normal";
                
                if (rodada && rodada.ativa) {
                    const frases = [rodada.fraseA, rodada.fraseB, rodada.fraseC];
                    
                    const modoHtml = modo === "normal" 
                        ? '<div class="modo-badge modo-normal"><i class="fas fa-smile"></i> Modo Normal - Descubra a Mentira</div>'
                        : '<div class="modo-badge modo-dificil"><i class="fas fa-skull"></i> Modo Difícil - Descubra a Mentira + Autor</div>';
                    
                    const autorHtml = modo === "normal" 
                        ? `<div class="jogador-destaque">
                            <i class="fas fa-user-circle" style="font-size:60px;"></i>
                            <h1 style="margin:10px 0;">${rodada.jogadorNome}</h1>
                            <p>Este jogador enviou 3 frases. Uma delas é MENTIRA!</p>
                           </div>`
                        : `<div class="jogador-destaque" style="background: linear-gradient(135deg, #1f2937, #374151);">
                            <i class="fas fa-user-secret" style="font-size:60px;"></i>
                            <h1 style="margin:10px 0;">🎭 JOGADOR ANÔNIMO</h1>
                            <p>Alguém enviou estas frases. Descubra quem é e qual é a mentira!</p>
                           </div>`;
                    
                    container.innerHTML = `
                        <div class="rodada-display">
                            <h2>🎲 Rodada Atual</h2>
                            ${modoHtml}
                            ${autorHtml}
                            <h3>📝 Frases:</h3>
                            <div class="frase-card"><strong>A)</strong> ${frases[0]}</div>
                            <div class="frase-card"><strong>B)</strong> ${frases[1]}</div>
                            <div class="frase-card"><strong>C)</strong> ${frases[2]}</div>
                            <div class="votos-container">
                                <div class="voto-card"><div class="voto-numero" id="votosA">0</div><div>Votos A</div></div>
                                <div class="voto-card"><div class="voto-numero" id="votosB">0</div><div>Votos B</div></div>
                                <div class="voto-card"><div class="voto-numero" id="votosC">0</div><div>Votos C</div></div>
                            </div>
                            <div id="votosAutorContainer" style="margin-top:20px;"></div>
                            <div style="margin-top:20px; padding:10px; background:#e0f2fe; border-radius:12px;">
                                <i class="fas fa-info-circle"></i> Aguardando votos... O resultado aparecerá automaticamente quando a votação terminar!
                            </div>
                        </div>
                    `;
                    
                    window.db.ref('votosMentira').on('value', (snap) => {
                        const votos = snap.val() || {};
                        const contagem = { A: 0, B: 0, C: 0 };
                        Object.values(votos).forEach(v => { if (contagem[v] !== undefined) contagem[v]++; });
                        document.getElementById('votosA').textContent = contagem.A;
                        document.getElementById('votosB').textContent = contagem.B;
                        document.getElementById('votosC').textContent = contagem.C;
                    });
                    
                    if (modo === "dificil") {
                        const votosAutorDiv = document.getElementById('votosAutorContainer');
                        votosAutorDiv.innerHTML = '<h4><i class="fas fa-users"></i> Votos para o Autor:</h4><div id="votosAutorList"></div>';
                        
                        window.db.ref('votosAutor').on('value', async (snap) => {
                            const votosAutor = snap.val() || {};
                            const contagemAutor = {};
                            Object.values(votosAutor).forEach(v => {
                                contagemAutor[v] = (contagemAutor[v] || 0) + 1;
                            });
                            
                            const jogadoresSnap = await window.db.ref('jogadores').once('value');
                            const jogadores = jogadoresSnap.val() || {};
                            
                            let html = '<div style="display:flex; justify-content:center; gap:15px; flex-wrap:wrap;">';
                            for (const [autorId, qtd] of Object.entries(contagemAutor)) {
                                const nome = jogadores[autorId]?.nome || autorId.substring(0, 8);
                                html += `<div class="voto-card"><div class="voto-numero">${qtd}</div><div>${nome}</div></div>`;
                            }
                            html += '</div>';
                            votosAutorDiv.innerHTML = `<h4><i class="fas fa-users"></i> Votos para o Autor:</h4>${html}`;
                        });
                    }
                    
                } else {
                    container.innerHTML = `
                        <div style="text-align:center;">
                            <i class="fas fa-hourglass-half" style="font-size:60px; color:#f59e0b;"></i>
                            <h2 style="margin-top:15px;">Aguardando Rodada</h2>
                            <p>O anfitrião vai iniciar o jogo em breve...</p>
                        </div>
                    `;
                    resultadoExibido = false;
                }
            });
        }
        
        async function atualizarRanking() {
            const pontuacoesSnap = await window.db.ref('pontuacoes').once('value');
            const pontuacoes = pontuacoesSnap.val() || {};
            const jogadoresSnap = await window.db.ref('jogadores').once('value');
            const jogadores = jogadoresSnap.val() || {};
            
            const ranking = Object.entries(pontuacoes)
                .map(([id, pontos]) => ({ nome: jogadores[id]?.nome || id, pontos }))
                .sort((a, b) => b.pontos - a.pontos);
            
            const container = document.getElementById('rankingContent');
            if (ranking.length === 0) {
                container.innerHTML = '<div style="text-align:center;">Nenhuma pontuação ainda</div>';
                return;
            }
            
            container.innerHTML = ranking.map((r, idx) => `
                <div class="ranking-card">
                    <div class="posicao">${idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx+1}º`}</div>
                    <div style="font-size:18px; font-weight:bold; margin:10px 0;">${r.nome}</div>
                    <div style="font-size:24px; color:#f59e0b;">${r.pontos} pts</div>
                </div>
            `).join('');
        }
        
        window.fecharResultado = fecharResultado;
        
        window.db.ref('pontuacoes').on('value', () => atualizarRanking());
        window.db.ref('jogadores').on('value', () => atualizarRanking());
        
        listenToRodada();
        listenToResultado();
        atualizarRanking();
    </script>
</body>
</html>
