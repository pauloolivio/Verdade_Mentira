<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Duas Verdades e Uma Mentira - Login</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .login-box {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-header i {
            font-size: 60px;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .login-header h2 {
            font-size: 28px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .login-header p {
            color: #6b7280;
            font-size: 14px;
        }
        .role-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .role-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
        }
        .role-btn i {
            font-size: 24px;
            display: block;
            margin-bottom: 8px;
        }
        .role-btn.active {
            border-color: #f59e0b;
            background: linear-gradient(135deg, #f59e0b15 0%, #ef444415 100%);
            color: #f59e0b;
        }
        .login-form {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .login-form.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group label i {
            margin-right: 8px;
            color: #f59e0b;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            transition: all 0.3s;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 44%;
            height: 1px;
            background: #e5e7eb;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .divider span {
            background: white;
            padding: 0 12px;
            color: #9ca3af;
            font-size: 12px;
        }
        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            border-left: 3px solid #dc2626;
        }
        .info-message {
            background: #e0f2fe;
            color: #0369a1;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
            font-size: 13px;
            text-align: center;
        }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #f59e0b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-theater-masks"></i>
                <h2>🎭 Duas Verdades e Uma Mentira</h2>
                <p>O clássico jogo de mentiras e revelações!</p>
            </div>

            <div class="role-buttons">
                <div class="role-btn host" onclick="selectRole('host')">
                    <i class="fas fa-crown"></i>
                    Anfitrião
                </div>
                <div class="role-btn player" onclick="selectRole('player')">
                    <i class="fas fa-user-friends"></i>
                    Jogador
                </div>
            </div>

            <div class="login-form" id="hostForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="hostEmail" placeholder="seu@email.com">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" id="hostPassword" placeholder="••••••••">
                </div>
                <button class="login-btn" onclick="loginHostEmail(event)">
                    <i class="fas fa-sign-in-alt"></i> Entrar como Anfitrião
                </button>
                <div class="info-message">
                    <i class="fas fa-info-circle"></i> Anfitrião controla o jogo, inicia rodadas e vê o ranking
                </div>
            </div>

            <div class="login-form" id="playerForm">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Seu Nome</label>
                    <input type="text" id="playerName" placeholder="Digite seu nome" autocomplete="off">
                </div>
                <button class="login-btn" onclick="loginPlayer(event)">
                    <i class="fas fa-door-open"></i> Entrar na Sala
                </button>
                <div class="info-message">
                    <i class="fas fa-smile-wink"></i> Use seu nome real para seus amigos saberem quem é você!
                </div>
            </div>

            <div class="divider"><span>ou</span></div>
            <button class="login-btn" onclick="abrirDashboard()" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                <i class="fas fa-tv"></i> 📺 Abrir Tela de Projeção
            </button>
        </div>
    </div>

    <script>
        let currentRole = null;

        window.abrirDashboard = function() {
            window.open('dashboard.html', '_blank');
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = '#10b981';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '12px';
            toast.style.zIndex = '9999';
            toast.innerHTML = '📺 Tela de projeção aberta!';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        window.selectRole = function(role) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.role-btn.${role}`).classList.add('active');
            document.getElementById('hostForm').classList.remove('active');
            document.getElementById('playerForm').classList.remove('active');
            if (role === 'host') {
                document.getElementById('hostForm').classList.add('active');
            } else {
                document.getElementById('playerForm').classList.add('active');
            }
        };

        function showError(formId, message) {
            const form = document.getElementById(formId);
            const existingError = form.querySelector('.error-message');
            if (existingError) existingError.remove();
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
            form.insertBefore(errorDiv, form.firstChild);
            setTimeout(() => errorDiv.remove(), 4000);
        }

        window.loginHostEmail = async function(event) {
            const btn = event.currentTarget;
            const email = document.getElementById('hostEmail').value.trim();
            const password = document.getElementById('hostPassword').value;
            if (!email || !password) {
                showError('hostForm', 'Preencha email e senha');
                return;
            }
            try {
                btn.innerHTML = '<span class="loading"></span> Entrando...';
                btn.disabled = true;
                await window.auth.signInWithEmailAndPassword(email, password);
                sessionStorage.setItem('userRole', 'host');
                sessionStorage.setItem('hostEmail', email);
                window.location.href = "anfitriao.html";
            } catch(error) {
                showError('hostForm', 'Erro: ' + error.message);
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar como Anfitrião';
                btn.disabled = false;
            }
        };

        window.loginPlayer = async function(event) {
            const btn = event.currentTarget;
            const nome = document.getElementById('playerName').value.trim();
            if (!nome || nome.length < 2) {
                showError('playerForm', 'Digite seu nome completo');
                return;
            }
            try {
                btn.innerHTML = '<span class="loading"></span> Entrando...';
                btn.disabled = true;
                const result = await window.auth.signInAnonymously();
                const userId = result.user.uid;
                await window.db.ref(`jogadores/${userId}`).set({
                    nome: nome,
                    online: true,
                    entrouEm: Date.now(),
                    ultimaAtividade: Date.now()
                });
                sessionStorage.setItem('userRole', 'player');
                sessionStorage.setItem('playerId', userId);
                sessionStorage.setItem('playerName', nome);
                window.location.href = "jogador.html";
            } catch(error) {
                showError('playerForm', 'Erro: ' + error.message);
                btn.innerHTML = '<i class="fas fa-door-open"></i> Entrar na Sala';
                btn.disabled = false;
            }
        };

        selectRole('player');
    </script>
</body>
</html>
