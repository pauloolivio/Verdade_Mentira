<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2V1M - Limpeza do Banco</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #1f2937; margin-bottom: 10px; }
        .warning {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
            padding: 15px;
            margin: 20px 0;
            border-radius: 12px;
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; transform: translateY(-2px); }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            display: none;
        }
        .status.show { display: block; }
        .status.success { background: #d1fae5; color: #065f46; }
        .status.error { background: #fee2e2; color: #991b1b; }
        .status.loading { background: #e0f2fe; color: #0369a1; }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ Limpeza do Banco - 2V1M</h1>
        <p>Ferramenta para resetar completamente os dados do jogo</p>

        <div class="warning">
            <strong>⚠️ ATENÇÃO!</strong><br>
            Esta ação irá REMOVER PERMANENTEMENTE:
            <ul style="margin-top: 10px; margin-left: 20px;">
                <li>Todos os jogadores</li>
                <li>Todas as frases enviadas</li>
                <li>Todas as pontuações</li>
                <li>Todos os votos</li>
                <li>Rodadas ativas</li>
            </ul>
        </div>

        <button class="btn-danger" onclick="confirmarLimpeza()">
            🗑️ LIMPAR TODOS OS DADOS
        </button>

        <div id="status" class="status"></div>
    </div>

    <script>
        async function confirmarLimpeza() {
            const confirmacao = confirm("⚠️ ATENÇÃO! Isso irá REMOVER TODOS OS DADOS permanentemente!\n\nTem certeza?");
            if (!confirmacao) return;
            
            const codigo = prompt("Digite 'LIMPAR' para confirmar a limpeza total:");
            if (codigo !== "LIMPAR") {
                alert("Código incorreto. Operação cancelada.");
                return;
            }
            
            const statusDiv = document.getElementById('status');
            statusDiv.className = 'status loading show';
            statusDiv.innerHTML = '<span class="spinner"></span> Limpando banco de dados...';
            
            try {
                await window.db.ref('jogadores').remove();
                await window.db.ref('frases').remove();
                await window.db.ref('pontuacoes').remove();
                await window.db.ref('votosRodada').remove();
                await window.db.ref('rodadaAtiva').set(null);
                await window.db.ref('sessao').set({ ativa: true });
                
                statusDiv.className = 'status success show';
                statusDiv.innerHTML = '✅ LIMPEZA TOTAL CONCLUÍDA! Todos os dados foram removidos.';
                
            } catch (error) {
                statusDiv.className = 'status error show';
                statusDiv.innerHTML = `❌ Erro: ${error.message}`;
            }
        }
        
        window.confirmarLimpeza = confirmarLimpeza;
    </script>
</body>
</html>
